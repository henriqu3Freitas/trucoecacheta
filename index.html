<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cacheta League</title>
    <script>
      !(function (f, b, e, v, n, t, s) {
        if (f.fbq) return;
        n = f.fbq = function () {
          n.callMethod ? n.callMethod.apply(n, arguments) : n.queue.push(arguments);
        };
        if (!f._fbq) f._fbq = n;
        n.push = n;
        n.loaded = !0;
        n.version = "2.0";
        n.queue = [];
        t = b.createElement(e);
        t.async = !0;
        t.src = v;
        s = b.getElementsByTagName(e)[0];
        s.parentNode.insertBefore(t, s);
      })(window, document, "script", "https://connect.facebook.net/en_US/fbevents.js");
      fbq("init", "1003040479386816");
      fbq("track", "PageView");
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Sora:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="src/css/styles.css" />
  </head>
  <body>
    <noscript>
      <img
        height="1"
        width="1"
        style="display: none"
        alt=""
        src="https://www.facebook.com/tr?id=1003040479386816&ev=PageView&noscript=1"
      />
    </noscript>
    <main class="hero">
      <div class="hero__bg" aria-hidden="true"></div>
      <div class="hero__content">
        <section class="copy">
          <header class="brand">
            <img src="assets/images/images-removebg-preview.png" alt="Cacheta League" class="brand__logo" />
          </header>

          <h1 class="title">
            <span class="title__line">
              <span class="title__gold">CACHETA, TRUCO, TRANCA E BURACO</span>
            </span>
            <span class="title__line">
              <span class="title__light">NO SEU CELULAR!</span>
            </span>
          </h1>

          <a
            class="cta"
            href="#lead-form"
            id="openLeadForm"
          >
            Clique e receba o link para download
          </a>
        </section>

        <div class="phone" aria-hidden="true">
          <div class="phone__frame"></div>
          <div class="phone__screen">
            <video
              class="phone__video"
              id="videoPlayer"
              src="assets/media/WhatsApp Video 2026-06-05 at 16.21.11.mp4"
              autoplay
              loop
              playsinline
              preload="auto"
            ></video>
            <div class="phone__overlay">
              <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
              </div>
              <div class="phone__controls">
                <button class="control-btn rewind-btn" id="rewindBtn" aria-label="Voltar 10 segundos">
                  <span>⏪</span>
                </button>
                <button class="control-btn play-btn" id="playPauseBtn" aria-label="Pausar/Reproduzir">
                  <span id="playPauseIcon">⏸</span>
                </button>
                <button class="control-btn forward-btn" id="forwardBtn" aria-label="Avançar 10 segundos">
                  <span>⏩</span>
                </button>
                <div class="time-display">
                  <span id="currentTime">0:00</span> / <span id="duration">0:00</span>
                </div>
                <button class="control-btn sound-btn" id="soundToggle" aria-label="Ativar/desativar som">
                  <span class="sound-icon">🔊</span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <a
        class="floating-whatsapp"
        href="https://api.whatsapp.com/send/?phone=5531971582866&text=Quero+jogar%21&type=phone_number&app_absent=0"
        target="_blank"
        rel="noreferrer"
        aria-label="Compartilhe no WhatsApp"
      >
        <img
          src="assets/images/whatsapp-logo-whatsapp-icon-whatsapp-transparent-free-png.webp"
          alt="WhatsApp"
          class="floating-whatsapp__icon"
        />
      </a>
    </main>

    <div class="modal" id="leadModal" aria-hidden="true">
      <div class="modal__backdrop" data-close-modal></div>
      <div class="modal__panel" role="dialog" aria-modal="true" aria-labelledby="leadFormTitle">
        <button class="modal__close" type="button" aria-label="Fechar formulário" data-close-modal>
          ×
        </button>
        <p class="modal__eyebrow">Acesso rápido</p>
        <h2 class="modal__title" id="leadFormTitle">Receba o link agora</h2>
        <p class="modal__text">Preencha seus dados para enviarmos e liberar o acesso na Play Store.</p>

        <form class="lead-form" id="leadForm">
          <label class="field">
            <span>Nome</span>
            <input type="text" name="name" id="leadName" placeholder="Seu nome" autocomplete="name" required />
          </label>

          <label class="field">
            <span>E-mail</span>
            <input
              type="email"
              name="email"
              id="leadEmail"
              placeholder="seuemail@exemplo.com"
              autocomplete="email"
              inputmode="email"
              autocapitalize="none"
              spellcheck="false"
              maxlength="254"
              required
            />
          </label>

          <label class="field">
            <span>Telefone</span>
            <input
              type="tel"
              name="phone"
              id="leadPhone"
              placeholder="(31) 99999-9999"
              autocomplete="tel"
              inputmode="tel"
              required
            />
          </label>

          <p class="lead-form__status" id="leadStatus" aria-live="polite"></p>

          <button class="lead-form__submit" type="submit">Enviar e abrir a Play Store</button>
        </form>
      </div>
    </div>

    <script src="src/js/app.js" defer></script>
  </body>
</html>
